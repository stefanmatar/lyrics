<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPresenter Lyrics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000000;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        #lyrics-container {
            width: 100%;
            padding: 3rem;
            text-align: center;
        }
        #lyrics-text {
            color: #ffffff;
            font-size: 3vw;
            line-height: 1.4;
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div id="lyrics-container">
        <div id="lyrics-text"></div>
    </div>
    <script>
        const API_SLIDE = '/api/status/slide';
        const API_AUDIENCE = '/api/status/audience_screens';
        const INTERVAL = 200;
        const text = document.getElementById('lyrics-text');
        let currentVisibleText = null;
        let pendingVisibleText = null;
        let pendingMatches = 0;
        let pollInterval = null;
        let hasRendered = false;

        function normalizeText(value) {
            return (value || '')
                .replace(/\r\n?/g, '\n')
                .split('\n')
                .map((line) => line.trim())
                .join('\n')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
        }

        function toVisibleText(value) {
            const normalized = normalizeText(value);
            if (!normalized) return '';

            const lines = normalized.split('\n').slice(0, 2);
            while (lines.length < 2) lines.push('');
            return lines.join('\n');
        }

        async function fetchData() {
            try {
                const [audienceResponse, slideResponse] = await Promise.all([
                    fetch(API_AUDIENCE),
                    fetch(API_SLIDE)
                ]);

                if (!audienceResponse.ok || !slideResponse.ok) return;

                const audienceActive = await audienceResponse.json();
                const slideData = await slideResponse.json();
                const newVisibleText = audienceActive === true ? toVisibleText(slideData.current?.text || '') : '';

                if (!hasRendered) {
                    currentVisibleText = newVisibleText;
                    update(newVisibleText);
                    hasRendered = true;
                    pendingVisibleText = null;
                    pendingMatches = 0;
                    return;
                }

                if (newVisibleText === currentVisibleText) {
                    pendingVisibleText = null;
                    pendingMatches = 0;
                    return;
                }

                if (newVisibleText === pendingVisibleText) {
                    pendingMatches += 1;
                } else {
                    pendingVisibleText = newVisibleText;
                    pendingMatches = 1;
                }

                if (pendingMatches >= 2) {
                    currentVisibleText = newVisibleText;
                    pendingVisibleText = null;
                    pendingMatches = 0;
                    update(newVisibleText);
                }
            } catch (error) {
            }
        }

        function update(txt) {
            text.textContent = txt && txt.trim() ? txt : '';
        }

        function start() {
            if (pollInterval) return;
            fetchData();
            pollInterval = setInterval(fetchData, INTERVAL);
        }

        function stop() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        window.addEventListener('load', start);
        window.addEventListener('beforeunload', stop);
    </script>
</body>
</html>
